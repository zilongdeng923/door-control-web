<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Door Control Receiver</title>
  <meta name="theme-color" content="#0b1226" />
  <style>
    :root {
      --bg:#0b1226; --text:#eef4ff; --muted:#a9bad7; --muted2:#91a4c6;
      --ok:#c8f7d7; --err:#ffd2d2; --warn:#ffe7ad;
      --panel:rgba(9,15,30,0.42); --border:rgba(255,255,255,0.08); --shadow:0 24px 60px rgba(0,0,0,0.42);
      --blue1:rgba(37,99,235,0.96); --blue2:rgba(59,130,246,0.94);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
    body{
      padding:24px 18px;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.48) 58%, rgba(0,0,0,0.76) 100%),
        radial-gradient(circle at center, rgba(96,165,250,0.18) 0%, rgba(96,165,250,0.06) 24%, rgba(0,0,0,0) 48%);
    }
    .wrap{max-width:980px;margin:0 auto}
    .title{font-size:38px;font-weight:800;margin:0 0 8px}
    .sub{margin:0 0 18px;color:var(--muted);line-height:1.7}
    .card{
      background:var(--panel);border:1px solid var(--border);border-radius:26px;padding:18px;
      backdrop-filter:blur(18px);box-shadow:var(--shadow);margin-bottom:16px
    }
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
    .status{line-height:1.7;white-space:pre-wrap}
    .ok{color:var(--ok)} .err{color:var(--err)} .warn{color:var(--warn)} .muted{color:var(--muted)}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    input,select{
      width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06);color:var(--text);font-size:15px
    }
    button,a.btn{
      border:none;border-radius:16px;padding:12px 16px;cursor:pointer;font-weight:700;color:white;
      background:linear-gradient(135deg,var(--blue1),var(--blue2));text-decoration:none;display:inline-block
    }
    .secondary{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1)}
    .danger{background:rgba(239,68,68,0.18);border:1px solid rgba(239,68,68,0.22)}
    .request{
      padding:14px;border-radius:18px;border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.03)
    }
    .request h4{margin:0 0 8px;font-size:18px}
    .meta{font-size:13px;color:var(--muted);line-height:1.6}
    .empty{color:var(--muted)}
    .pill{
      display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;
      font-weight:700;margin-bottom:10px
    }
    .pill.pending{background:rgba(255,231,173,0.16);color:var(--warn)}
    .pill.approved{background:rgba(200,247,215,0.14);color:var(--ok)}
    .pill.rejected,.pill.expired{background:rgba(255,210,210,0.14);color:var(--err)}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">Door Control Receiver</h1>
    <p class="sub">住户接收端。用于审批临时访问申请；临时开门请求将由设备直接处理。</p>

    <div class="card">
      <div id="authInfo" class="status">正在验证身份…</div>
      <div class="row" style="margin-top:12px;">
        <button id="loginBtn">使用 Google 登录</button>
        <button id="logoutBtn" class="secondary" style="display:none;">退出登录</button>
        <a class="btn secondary" href="./index.html">返回首页</a>
      </div>
    </div>

    <div id="mainArea" style="display:none;">
      <div class="card">
        <h3>设备状态</h3>
        <div id="deviceStateBox" class="status muted">加载中…</div>
      </div>

      <div class="card">
        <h3>待审批申请</h3>
        <div id="requestsBox" class="grid"></div>
      </div>

      <div class="card">
        <h3>已处理申请</h3>
        <div id="historyBox" class="grid"></div>
      </div>

      <div class="card">
        <h3>日志</h3>
        <div id="logBox" class="status muted">Ready</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtoDn5nsyPdX4_qzE4mEiilorBlsMg8oI",
      authDomain: "door-control-1fb5a.firebaseapp.com",
      databaseURL: "https://door-control-1fb5a-default-rtdb.firebaseio.com",
      projectId: "door-control-1fb5a",
      storageBucket: "door-control-1fb5a.firebasestorage.app",
      messagingSenderId: "594532135937",
      appId: "1:594532135937:web:e5c91175f45f7d54d83c00"
    };

    const ADMIN_UID = "Mkcg6WPhneTMfmJmbUBD5h9Dpbb2";
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    const authInfo = document.getElementById("authInfo");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const mainArea = document.getElementById("mainArea");
    const deviceStateBox = document.getElementById("deviceStateBox");
    const requestsBox = document.getElementById("requestsBox");
    const historyBox = document.getElementById("historyBox");
    const logBox = document.getElementById("logBox");

    function log(msg, type = "muted") {
      logBox.className = `status ${type}`;
      logBox.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    }

    function randomToken(len = 40) {
      const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let out = "";
      const arr = crypto.getRandomValues(new Uint8Array(len));
      for (const n of arr) out += chars[n % chars.length];
      return out;
    }

    function fmtTime(ts) {
      if (!ts) return "-";
      return new Date(ts).toLocaleString();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
      }[ch]));
    }

    function statusClass(status) {
      if (status === "approved") return "approved";
      if (status === "rejected") return "rejected";
      if (status === "expired") return "expired";
      return "pending";
    }

    function renderDeviceState(state) {
      if (!state) {
        deviceStateBox.textContent = "未读取到设备状态。";
        return;
      }
      const online = !!state.online && (Date.now() - (state.lastSeen || 0) < 10000);
      deviceStateBox.innerHTML =
        `在线：${online ? "是" : "否"}\n` +
        `忙碌：${state.busy ? "是" : "否"}\n` +
        `话筒：${state.micState || "idle"}\n` +
        `通话中：${state.callActive ? "是" : "否"}\n` +
        `最近动作：${state.lastAction || "-"}\n` +
        `错误：${state.error || "无"}`;
    }

    async function loadUserMeta(uid) {
      const snap = await get(ref(db, `users/${uid}`));
      return snap.val() || {};
    }

    function canEnter(role, meta, user) {
      return !!user && (
        user.uid === ADMIN_UID ||
        role === "admin" ||
        role === "resident" ||
        meta.canReviewTemporaryAccess === true
      );
    }

    function canReview(meta, user) {
      return !!user && (
        user.uid === ADMIN_UID ||
        meta.role === "admin" ||
        meta.role === "resident" ||
        meta.canReviewTemporaryAccess === true
      );
    }

    async function approveRequest(reqId, reqData, durationValue, durationUnit, maxUses) {
      const user = auth.currentUser;
      if (!user) return;
      const now = Date.now();
      const ttlMs = durationUnit === "hours" ? durationValue * 3600 * 1000 : durationValue * 60 * 1000;
      const expiresAt = now + ttlMs;
      const grantToken = randomToken(40);
      const updates = {};

      updates[`temporaryAccessRequests/${reqId}/status`] = "approved";
      updates[`temporaryAccessRequests/${reqId}/approvedBy`] = user.uid;
      updates[`temporaryAccessRequests/${reqId}/approvedAt`] = now;
      updates[`temporaryAccessRequests/${reqId}/grantToken`] = grantToken;
      updates[`temporaryAccessRequests/${reqId}/result/type`] = "temporary_grant";
      updates[`temporaryAccessRequests/${reqId}/result/expiresAt`] = expiresAt;

      if (reqData.sessionToken) {
        updates[`temporaryRequestSessions/${reqData.sessionToken}`] = {
          requestId: reqId,
          status: "approved",
          createdAt: reqData.createdAt || now,
          grantToken,
          approvedAt: now,
          updatedAt: now
        };
      }

      updates[`temporaryAccessGrants/${grantToken}`] = {
        requestId: reqId,
        sessionToken: reqData.sessionToken || "",
        createdAt: now,
        expiresAt,
        used: false,
        status: "active",
        usedAt: 0,
        maxUses,
        remainingUses: maxUses
      };

      await update(ref(db), updates);
      log(`已批准申请 ${reqId}，有效期 ${durationValue} ${durationUnit === "hours" ? "小时" : "分钟"}，次数 ${maxUses}。`, "ok");
    }

    async function rejectRequest(reqId, reqData) {
      const user = auth.currentUser;
      if (!user) return;
      const now = Date.now();
      const updates = {};

      updates[`temporaryAccessRequests/${reqId}/status`] = "rejected";
      updates[`temporaryAccessRequests/${reqId}/rejectedBy`] = user.uid;
      updates[`temporaryAccessRequests/${reqId}/rejectedAt`] = now;

      if (reqData.sessionToken) {
        updates[`temporaryRequestSessions/${reqData.sessionToken}`] = {
          requestId: reqId,
          status: "rejected",
          createdAt: reqData.createdAt || now,
          grantToken: "",
          approvedAt: 0,
          updatedAt: now
        };
      }

      await update(ref(db), updates);
      log(`已拒绝申请 ${reqId}。`, "warn");
    }

    async function deleteRequest(reqId, reqData) {
      const updates = {};
      updates[`temporaryAccessRequests/${reqId}`] = null;
      if (reqData?.sessionToken) updates[`temporaryRequestSessions/${reqData.sessionToken}`] = null;
      if (reqData?.grantToken) updates[`temporaryAccessGrants/${reqData.grantToken}`] = null;
      await update(ref(db), updates);
      log(`已删除申请 ${reqId}。`, "warn");
    }

    function renderPendingRequests(entries, reviewAllowed) {
      if (!entries.length) {
        requestsBox.innerHTML = '<div class="empty">当前没有待审批申请。</div>';
        return;
      }
      requestsBox.innerHTML = "";
      for (const [reqId, req] of entries) {
        const card = document.createElement("div");
        card.className = "request";
        card.innerHTML = `
          <div class="pill pending">待审批</div>
          <h4>${escapeHtml(req.name || "未命名申请")}</h4>
          <div class="meta">
            联系方式：${escapeHtml(req.contact || "-")}<br>
            来访原因：${escapeHtml(req.reason || "-")}<br>
            备注：${escapeHtml(req.note || "-")}<br>
            提交时间：${fmtTime(req.createdAt)}
          </div>
          <div class="grid" style="margin-top:12px;">
            <div>
              <label>时长数值</label>
              <input type="number" min="1" max="1440" value="30" data-role="duration-value" />
            </div>
            <div>
              <label>时长单位</label>
              <select data-role="duration-unit">
                <option value="minutes">分钟</option>
                <option value="hours">小时</option>
              </select>
            </div>
            <div>
              <label>允许开门次数</label>
              <input type="number" min="1" max="99" value="1" data-role="max-uses" />
            </div>
          </div>
          <div class="row" style="margin-top:12px;">
            <button data-action="approve">批准</button>
            <button data-action="reject" class="danger">拒绝</button>
          </div>
        `;

        const approveBtn = card.querySelector('[data-action="approve"]');
        const rejectBtn = card.querySelector('[data-action="reject"]');
        const durationValueInput = card.querySelector('[data-role="duration-value"]');
        const durationUnitSelect = card.querySelector('[data-role="duration-unit"]');
        const maxUsesInput = card.querySelector('[data-role="max-uses"]');

        approveBtn.disabled = !reviewAllowed;
        rejectBtn.disabled = !reviewAllowed;
        durationValueInput.disabled = !reviewAllowed;
        durationUnitSelect.disabled = !reviewAllowed;
        maxUsesInput.disabled = !reviewAllowed;

        approveBtn.addEventListener("click", async () => {
          try {
            const durationValue = Math.max(1, Number(durationValueInput.value) || 30);
            const durationUnit = durationUnitSelect.value === "hours" ? "hours" : "minutes";
            const maxUses = Math.max(1, Number(maxUsesInput.value) || 1);
            await approveRequest(reqId, req, durationValue, durationUnit, maxUses);
          } catch (error) {
            console.error(error);
            log(`批准申请 ${reqId} 失败。`, "err");
          }
        });

        rejectBtn.addEventListener("click", async () => {
          try {
            await rejectRequest(reqId, req);
          } catch (error) {
            console.error(error);
            log(`拒绝申请 ${reqId} 失败。`, "err");
          }
        });

        requestsBox.appendChild(card);
      }
    }

    function renderHistory(entries, reviewAllowed) {
      if (!entries.length) {
        historyBox.innerHTML = '<div class="empty">当前没有已处理申请。</div>';
        return;
      }
      historyBox.innerHTML = "";
      for (const [reqId, req] of entries) {
        const card = document.createElement("div");
        card.className = "request";
        card.innerHTML = `
          <div class="pill ${statusClass(req.status || "pending")}">${escapeHtml(req.status || "pending")}</div>
          <h4>${escapeHtml(req.name || "未命名申请")}</h4>
          <div class="meta">
            联系方式：${escapeHtml(req.contact || "-")}<br>
            来访原因：${escapeHtml(req.reason || "-")}<br>
            备注：${escapeHtml(req.note || "-")}<br>
            提交时间：${fmtTime(req.createdAt)}<br>
            批准时间：${fmtTime(req.approvedAt)}<br>
            拒绝时间：${fmtTime(req.rejectedAt)}<br>
            grantToken：${escapeHtml(req.grantToken || "-")}
          </div>
          <div class="row" style="margin-top:12px;">
            <button data-action="delete" class="danger">删除记录</button>
          </div>
        `;

        const deleteBtn = card.querySelector('[data-action="delete"]');
        deleteBtn.disabled = !reviewAllowed;

        deleteBtn.addEventListener("click", async () => {
          try {
            await deleteRequest(reqId, req);
          } catch (error) {
            console.error(error);
            log(`删除记录 ${reqId} 失败。`, "err");
          }
        });

        historyBox.appendChild(card);
      }
    }

    loginBtn.addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error(error);
        authInfo.textContent = "登录失败。";
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        authInfo.textContent = "未登录。请先使用 Google 登录。";
        loginBtn.style.display = "";
        logoutBtn.style.display = "none";
        mainArea.style.display = "none";
        return;
      }

      const meta = await loadUserMeta(user.uid);
      const role = meta.role || "visitor";

      if (!canEnter(role, meta, user)) {
        authInfo.textContent = `已登录：${user.email || user.uid}\n权限不足，无法进入临时访问审批后台。`;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "";
        mainArea.style.display = "none";
        return;
      }

      const reviewAllowed = canReview(meta, user);

      authInfo.textContent =
        `已登录：${user.email || user.uid}\n` +
        `角色：${role || "未设置"}\n` +
        `临时审批权限：${reviewAllowed ? "有" : "无"}`;

      loginBtn.style.display = "none";
      logoutBtn.style.display = "";
      mainArea.style.display = "";

      onValue(ref(db, "deviceState"), (snapshot) => {
        renderDeviceState(snapshot.val() || {});
      });

      onValue(ref(db, "temporaryAccessRequests"), (snap) => {
        const all = Object.entries(snap.val() || {});
        all.sort((a, b) => ((b[1]?.createdAt || 0) - (a[1]?.createdAt || 0)));
        const pending = all.filter(([, v]) => (v?.status || "pending") === "pending");
        const handled = all.filter(([, v]) => (v?.status || "pending") !== "pending");
        renderPendingRequests(pending, reviewAllowed);
        renderHistory(handled, reviewAllowed);
      }, (error) => {
        console.error(error);
        log("监听临时访问申请失败。", "err");
      });
    });
  </script>
</body>
</html>
