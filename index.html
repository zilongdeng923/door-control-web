<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Door Control</title>
  <meta name="theme-color" content="#0b1226" />
  <style>
    :root {
      --text: #eef4ff;
      --muted: #a9bad7;
      --muted-2: #91a4c6;
      --success: #7ae39e;
      --error: #ffb3b3;
      --warning: #ffe29a;

      --panel-bg: rgba(9, 15, 30, 0.38);
      --panel-border: rgba(255, 255, 255, 0.08);
      --panel-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);

      --btn-blue-1: rgba(37, 99, 235, 0.96);
      --btn-blue-2: rgba(59, 130, 246, 0.94);
      --btn-blue-3: rgba(120, 184, 255, 0.92);

      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: #0b1226;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 18px;
      position: relative;
      overflow-x: hidden;
    }

    /* 背景主图 + 空间层次 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center,
          rgba(0,0,0,0.10) 0%,
          rgba(0,0,0,0.48) 58%,
          rgba(0,0,0,0.76) 100%
        ),
        radial-gradient(circle at center,
          rgba(96,165,250,0.18) 0%,
          rgba(96,165,250,0.06) 24%,
          rgba(0,0,0,0) 48%
        ),
        url("./assets/bg-door.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      filter: brightness(1.12) contrast(1.08) saturate(1.02);
      z-index: 0;
    }

    /* 呼吸光 */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center,
          rgba(255,255,255,0.06) 0%,
          rgba(255,255,255,0.00) 42%);
      z-index: 0;
      pointer-events: none;
      animation: glowBreath 4.6s ease-in-out infinite;
    }

    @keyframes glowBreath {
      0%, 100% { opacity: 0.62; }
      50% { opacity: 1; }
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      min-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      animation: floatPanel 6.6s ease-in-out infinite;
    }

    @keyframes floatPanel {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    /* 顶部区域：轻、靠上、不给门添堵 */
    .top-overlay {
      padding-top: 6px;
    }

    .top-chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 28px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 12px;
      color: #c8d6f0;
      background: rgba(7, 13, 28, 0.28);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    }

    .chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 12px rgba(122, 227, 158, 0.85);
    }

    .hero-text {
      text-align: center;
      padding: 0 8px;
    }

    .brand-title {
      margin: 0 0 14px;
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0,0,0,0.28);
    }

    .brand-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
      text-shadow: 0 1px 10px rgba(0,0,0,0.22);
    }

    /* 中间纯留白，让门自己发光 */
    .door-space {
      flex: 1;
      min-height: 250px;
    }

    /* 下方控制区 */
    .control-stack {
      padding-bottom: 8px;
    }

    .login-panel,
    .account-panel,
    .status-panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      box-shadow: var(--panel-shadow);
    }

    .login-panel {
      padding: 16px;
    }

    #appSection {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .account-panel {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, #2563eb, #60a5fa);
      color: white;
      font-size: 18px;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow:
        0 8px 20px rgba(37,99,235,0.28),
        inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .user-meta {
      min-width: 0;
      flex: 1;
    }

    .user-label {
      color: var(--muted-2);
      font-size: 12px;
      margin-bottom: 5px;
      letter-spacing: 0.03em;
    }

    .user-email {
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      color: var(--text);
    }

    .btn {
      width: 100%;
      border: none;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      user-select: none;
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn:disabled {
      opacity: 0.64;
      cursor: not-allowed;
    }

    .btn-login {
      padding: 18px 18px;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      background:
        linear-gradient(135deg, rgba(37,99,235,0.96), rgba(96,165,250,0.94));
      box-shadow:
        0 14px 32px rgba(37,99,235,0.32),
        inset 0 1px 0 rgba(255,255,255,0.20);
    }

    /* 高级按钮核心 */
    .btn-open {
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      padding: 24px 18px;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,0.18) 0%,
          rgba(255,255,255,0.05) 16%,
          rgba(255,255,255,0.02) 100%
        ),
        linear-gradient(135deg,
          var(--btn-blue-1) 0%,
          var(--btn-blue-2) 52%,
          var(--btn-blue-3) 100%
        );
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.26),
        inset 0 -12px 28px rgba(255,255,255,0.04),
        0 14px 36px rgba(37,99,235,0.30),
        0 0 36px rgba(96,165,250,0.22);
    }

    /* 按钮表面扫光 */
    .btn-open::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          120deg,
          transparent 18%,
          rgba(255,255,255,0.24) 42%,
          transparent 68%
        );
      transform: translateX(-150%);
      animation: sweep 3.9s linear infinite;
    }

    /* 按钮顶部高光 */
    .btn-open::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 50% 0%,
          rgba(255,255,255,0.36),
          rgba(255,255,255,0.00) 42%);
      pointer-events: none;
      opacity: 0.9;
    }

    @keyframes sweep {
      0% { transform: translateX(-150%); }
      100% { transform: translateX(150%); }
    }

    .btn-open-title,
    .btn-open-sub {
      position: relative;
      z-index: 1;
      display: block;
      text-align: center;
    }

    .btn-open-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #f8fbff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .btn-open-sub {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.02em;
    }

    .status-panel {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 16px;
      margin-top: 14px;
    }

    .status-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
    }

    .status-body {
      flex: 1;
      min-width: 0;
    }

    .status-title {
      font-size: 13px;
      color: var(--muted-2);
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status-text {
      font-size: 15px;
      line-height: 1.65;
      word-break: break-word;
    }

    .ok-text { color: #c8f7d7; }
    .err-text { color: #ffd2d2; }
    .warn-text { color: #ffe7ad; }
    .muted-text { color: var(--muted); }

    .btn-logout {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      font-size: 15px;
      font-weight: 700;
      color: #ffb3b3;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.18);
      box-shadow: 0 10px 28px rgba(0,0,0,0.16);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      .brand-title {
        font-size: 40px;
      }

      .brand-subtitle {
        font-size: 14px;
      }

      .door-space {
        min-height: 210px;
      }

      .btn-open-title {
        font-size: 23px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body::after,
      .app,
      .btn-open::before {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="top-overlay">
      <div class="top-chips">
        <div class="chip">
          <span class="chip-dot"></span>
          <span>Remote Access Ready</span>
        </div>
        <div class="chip">Firebase Secured</div>
      </div>

      <div class="hero-text">
        <h1 class="brand-title">Door Control</h1>
        <p class="brand-subtitle">
          使用 Google 登录后发送开门指令。<br />
          指令会经由 Firebase 安全下发到设备。
        </p>
      </div>
    </section>

    <section class="door-space"></section>

    <section class="control-stack">
      <section id="loginSection" class="login-panel">
        <button id="loginBtn" class="btn btn-login">使用 Google 登录</button>
      </section>

      <section id="appSection" class="hidden">
        <div class="account-panel">
          <div class="avatar" id="avatar">U</div>
          <div class="user-meta">
            <div class="user-label">当前账户</div>
            <div class="user-email" id="userEmail">未登录</div>
          </div>
        </div>

        <div style="height: 14px;"></div>

        <button id="openBtn" class="btn btn-open">
          <span class="btn-open-title">OPEN DOOR</span>
          <span class="btn-open-sub">发送一次开门指令</span>
        </button>
      </section>

      <section class="status-panel">
        <div class="status-icon" id="statusIcon">●</div>
        <div class="status-body">
          <div class="status-title">System Status</div>
          <div class="status-text muted-text" id="statusText">Ready</div>
        </div>
      </section>

      <button id="logoutBtn" class="btn btn-logout hidden">退出登录</button>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtoDn5nsyPdX4_qzE4mEiilorBlsMg8oI",
      authDomain: "door-control-1fb5a.firebaseapp.com",
      databaseURL: "https://door-control-1fb5a-default-rtdb.firebaseio.com",
      projectId: "door-control-1fb5a",
      storageBucket: "door-control-1fb5a.firebasestorage.app",
      messagingSenderId: "594532135937",
      appId: "1:594532135937:web:e5c91175f45f7d54d83c00"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    const loginSection = document.getElementById("loginSection");
    const appSection = document.getElementById("appSection");
    const loginBtn = document.getElementById("loginBtn");
    const openBtn = document.getElementById("openBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const userEmail = document.getElementById("userEmail");
    const avatar = document.getElementById("avatar");
    const statusText = document.getElementById("statusText");
    const statusIcon = document.getElementById("statusIcon");

    let busy = false;

    function setStatus(message, type = "muted") {
      statusText.textContent = message;
      statusText.className = `status-text ${
        type === "ok" ? "ok-text" :
        type === "err" ? "err-text" :
        type === "warn" ? "warn-text" :
        "muted-text"
      }`;

      statusIcon.textContent =
        type === "ok" ? "✓" :
        type === "err" ? "!" :
        type === "warn" ? "•" :
        "●";
    }

    function setLoggedOutUI() {
      loginSection.classList.remove("hidden");
      appSection.classList.add("hidden");
      logoutBtn.classList.add("hidden");
      userEmail.textContent = "未登录";
      avatar.textContent = "U";
    }

    function setLoggedInUI(user) {
      loginSection.classList.add("hidden");
      appSection.classList.remove("hidden");
      logoutBtn.classList.remove("hidden");
      userEmail.textContent = user.email || "Unknown user";
      avatar.textContent = (user.email?.[0] || "U").toUpperCase();
    }

    loginBtn.addEventListener("click", async () => {
      try {
        setStatus("正在打开 Google 登录…", "warn");
        await signInWithPopup(auth, provider);
      } catch (err) {
        console.error(err);
        setStatus("登录失败。请检查授权域名和 Firebase 配置。", "err");
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        setStatus("已退出登录。", "muted");
      } catch (err) {
        console.error(err);
        setStatus("退出失败。", "err");
      }
    });

    openBtn.addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user) {
        setStatus("你还没有登录。", "err");
        return;
      }
      if (busy) return;

      busy = true;
      openBtn.disabled = true;
      setStatus("正在发送指令…", "warn");

      try {
        const openRef = ref(db, "commands/open");
        const snapshot = await get(openRef);
        const current = snapshot.val();

        if (current && current.pending === true) {
          setStatus("设备还在处理上一条指令。", "err");
        } else {
          await set(openRef, {
            pending: true,
            requestedAt: Date.now(),
            requestedBy: user.uid
          });
          setStatus("指令已发送。", "ok");
        }
      } catch (err) {
        console.error(err);
        setStatus("发送失败。请检查数据库规则与登录状态。", "err");
      } finally {
        setTimeout(() => {
          busy = false;
          openBtn.disabled = false;
        }, 1200);
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        setLoggedInUI(user);
        setStatus("已登录，可以发送指令。", "ok");
      } else {
        setLoggedOutUI();
        setStatus("请先登录。", "muted");
      }
    });
  </script>
</body>
</html>
