<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Door Control</title>
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #e5eefc;
      --muted: #9fb0cc;
      --primary: #60a5fa;
      --primary-2: #3b82f6;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.20), transparent 26%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .bg-orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(70px);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 {
      width: 220px;
      height: 220px;
      background: #2563eb;
      top: -40px;
      left: -50px;
    }

    .orb-2 {
      width: 260px;
      height: 260px;
      background: #0ea5e9;
      bottom: -70px;
      right: -70px;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 28px 24px 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.8);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .brand-title {
      margin: 0;
      font-size: 40px;
      line-height: 1;
      letter-spacing: -0.03em;
      font-weight: 800;
    }

    .brand-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .content {
      padding: 22px 20px 20px;
    }

    .section {
      margin-bottom: 18px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 16px;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: white;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-meta {
      min-width: 0;
      flex: 1;
    }

    .user-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .user-email {
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.16s ease, opacity 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-login {
      padding: 18px 18px;
      font-size: 18px;
      color: white;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.35);
    }

    .btn-login:hover {
      box-shadow: 0 16px 34px rgba(37, 99, 235, 0.42);
    }

    .btn-open {
      position: relative;
      padding: 22px 20px;
      font-size: 24px;
      letter-spacing: 0.02em;
      color: white;
      background:
        linear-gradient(135deg, #1d4ed8, #3b82f6 45%, #60a5fa);
      box-shadow: 0 18px 38px rgba(59, 130, 246, 0.30);
      overflow: hidden;
    }

    .btn-open::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 10%, rgba(255,255,255,0.18) 35%, transparent 60%);
      transform: translateX(-120%);
      transition: transform 0.8s ease;
    }

    .btn-open:hover::before {
      transform: translateX(120%);
    }

    .btn-open-sub {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 500;
      opacity: 0.9;
    }

    .btn-logout {
      padding: 14px 16px;
      font-size: 14px;
      color: #fecaca;
      background: rgba(239, 68, 68, 0.10);
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .status {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      min-height: 70px;
    }

    .status-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .status-body {
      flex: 1;
      min-width: 0;
    }

    .status-title {
      margin: 0 0 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status-text {
      margin: 0;
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
    }

    .ok-text { color: #bbf7d0; }
    .err-text { color: #fecaca; }
    .warn-text { color: #fde68a; }
    .muted-text { color: var(--muted); }

    .footer-note {
      margin-top: 6px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="app">
    <section class="panel">
      <div class="hero">
        <div class="hero-top">
          <div class="chip">
            <span class="chip-dot"></span>
            <span>Remote Access Ready</span>
          </div>
          <div class="chip">Firebase Secured</div>
        </div>

        <div class="brand">
          <h1 class="brand-title">Door Control</h1>
          <p class="brand-subtitle">
            使用 Google 登录后发送开门指令。<br />
            指令会经由 Firebase 安全下发到设备。
          </p>
        </div>
      </div>

      <div class="content">
        <section id="loginSection" class="section">
          <button id="loginBtn" class="btn btn-login">使用 Google 登录</button>
        </section>

        <section id="appSection" class="section hidden">
          <div class="card user-card">
            <div class="avatar" id="avatar">U</div>
            <div class="user-meta">
              <div class="user-label">当前账户</div>
              <div class="user-email" id="userEmail">未登录</div>
            </div>
          </div>

          <div style="height: 14px;"></div>

          <button id="openBtn" class="btn btn-open">
            OPEN DOOR
            <div class="btn-open-sub">发送一次开门指令</div>
          </button>

          <div style="height: 12px;"></div>

          <button id="logoutBtn" class="btn btn-logout">退出登录</button>
        </section>

        <section class="section">
          <div class="card status">
            <div class="status-icon" id="statusIcon">●</div>
            <div class="status-body">
              <p class="status-title">System Status</p>
              <p class="status-text muted-text" id="statusText">Ready</p>
            </div>
          </div>
        </section>

        <p class="footer-note">
          只有已授权账户可以写入开门指令。<br />
          设备执行后会自动将指令状态重置。
        </p>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtoDn5nsyPdX4_qzE4mEiilorBlsMg8oI",
      authDomain: "door-control-1fb5a.firebaseapp.com",
      projectId: "door-control-1fb5a",
      storageBucket: "door-control-1fb5a.firebasestorage.app",
      messagingSenderId: "594532135937",
      appId: "1:594532135937:web:e5c91175f45f7d54d83c00"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    const loginSection = document.getElementById("loginSection");
    const appSection = document.getElementById("appSection");
    const loginBtn = document.getElementById("loginBtn");
    const openBtn = document.getElementById("openBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const userEmail = document.getElementById("userEmail");
    const avatar = document.getElementById("avatar");
    const statusText = document.getElementById("statusText");
    const statusIcon = document.getElementById("statusIcon");

    let busy = false;

    function setStatus(message, type = "muted") {
      statusText.textContent = message;
      statusText.className = `status-text ${
        type === "ok" ? "ok-text" :
        type === "err" ? "err-text" :
        type === "warn" ? "warn-text" :
        "muted-text"
      }`;

      statusIcon.textContent =
        type === "ok" ? "✓" :
        type === "err" ? "!" :
        type === "warn" ? "•" :
        "●";
    }

    function setLoggedOutUI() {
      loginSection.classList.remove("hidden");
      appSection.classList.add("hidden");
      userEmail.textContent = "未登录";
      avatar.textContent = "U";
    }

    function setLoggedInUI(user) {
      loginSection.classList.add("hidden");
      appSection.classList.remove("hidden");
      userEmail.textContent = user.email || "Unknown user";
      avatar.textContent = (user.email?.[0] || "U").toUpperCase();
    }

    loginBtn.addEventListener("click", async () => {
      try {
        setStatus("正在打开 Google 登录…", "warn");
        await signInWithPopup(auth, provider);
      } catch (err) {
        console.error(err);
        setStatus("登录失败。请检查授权域名和 Firebase 配置。", "err");
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        setStatus("已退出登录。", "muted");
      } catch (err) {
        console.error(err);
        setStatus("退出失败。", "err");
      }
    });

    openBtn.addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user) {
        setStatus("你还没有登录。", "err");
        return;
      }
      if (busy) return;

      busy = true;
      openBtn.disabled = true;
      setStatus("正在发送指令…", "warn");

      try {
        const openRef = ref(db, "commands/open");
        const snapshot = await get(openRef);
        const current = snapshot.val();

        if (current && current.pending === true) {
          setStatus("设备还在处理上一条指令。", "err");
        } else {
          await set(openRef, {
            pending: true,
            requestedAt: Date.now(),
            requestedBy: user.uid
          });
          setStatus("指令已发送。", "ok");
        }
      } catch (err) {
        console.error(err);
        setStatus("发送失败。请检查数据库规则与登录状态。", "err");
      } finally {
        setTimeout(() => {
          busy = false;
          openBtn.disabled = false;
        }, 1200);
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        setLoggedInUI(user);
        setStatus("已登录，可以发送指令。", "ok");
      } else {
        setLoggedOutUI();
        setStatus("请先登录。", "muted");
      }
    });
  </script>
</body>
</html>
