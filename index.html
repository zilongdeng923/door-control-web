<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Door Control</title>
  <meta name="theme-color" content="#0b1226" />
  <style>
    :root {
      --bg: #0b1226;
      --text: #eef4ff;
      --muted: #a9bad7;
      --muted2: #91a4c6;
      --ok: #7ae39e;
      --err: #ffb3b3;
      --warn: #ffe29a;
      --panel: rgba(9, 15, 30, 0.38);
      --border: rgba(255,255,255,0.08);
      --shadow: 0 24px 60px rgba(0,0,0,0.42);
      --blue1: rgba(37,99,235,0.96);
      --blue2: rgba(59,130,246,0.94);
      --blue3: rgba(120,184,255,0.92);
      --danger1: rgba(239,68,68,0.92);
      --danger2: rgba(248,113,113,0.92);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; min-height: 100%;
      font-family: Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text); background: var(--bg);
    }
    body {
      min-height: 100vh; display: flex; justify-content: center;
      padding: 24px 18px; position: relative; overflow-x: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.48) 58%, rgba(0,0,0,0.76) 100%),
        radial-gradient(circle at center, rgba(96,165,250,0.18) 0%, rgba(96,165,250,0.06) 24%, rgba(0,0,0,0) 48%),
        url("./assets/bg-door.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      filter: brightness(1.12) contrast(1.08) saturate(1.02);
    }
    body::after {
      content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 58%, rgba(170,210,255,0.20) 0%, rgba(120,180,255,0.12) 18%, rgba(80,140,255,0.06) 34%, rgba(255,255,255,0) 56%),
        radial-gradient(ellipse at 50% 64%, rgba(255,255,255,0.22) 0%, rgba(190,220,255,0.14) 16%, rgba(120,180,255,0.06) 28%, rgba(255,255,255,0) 42%);
      animation: bloom 4.8s ease-in-out infinite;
    }
    @keyframes bloom { 0%,100%{opacity:.72;transform:scale(1)} 50%{opacity:1;transform:scale(1.02)} }

    .app {
      position: relative; z-index: 1; width: 100%; max-width: 430px;
      min-height: calc(100vh - 48px); display: flex; flex-direction: column;
    }
    .hero { text-align: center; padding-top: 8px; position: relative; }
    .top-actions {
      position: absolute; top: 0; right: 0;
      display: flex; gap: 10px; align-items: center;
    }
    .icon-link {
      width: 42px; height: 42px; display: grid; place-items: center;
      border-radius: 14px; text-decoration: none; color: var(--text);
      background: rgba(7,13,28,0.34); border:1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px); box-shadow: 0 6px 20px rgba(0,0,0,0.18);
      font-size: 18px;
    }
    .chips { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:28px; }
    .chip {
      padding:10px 14px; border-radius:999px; font-size:12px; color:#c8d6f0;
      background: rgba(7,13,28,0.28); border:1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px); box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    }
    .title { margin:0 0 14px; font-size:48px; font-weight:800; letter-spacing:-0.045em; line-height:1; }
    .subtitle { margin:0; color:var(--muted); font-size:15px; line-height:1.75; }
    .space { flex:1; min-height:250px; }

    .panel {
      background: var(--panel); border:1px solid var(--border); border-radius:30px;
      backdrop-filter: blur(20px); box-shadow: var(--shadow);
    }
    .login-panel, .account-panel, .status-panel, .button-panel, .nav-panel { padding:16px; }
    #appSection { display:flex; flex-direction:column; gap:14px; }
    .account-panel { display:flex; gap:14px; align-items:center; }
    .avatar {
      width:50px; height:50px; border-radius:50%; display:grid; place-items:center;
      background: linear-gradient(135deg, #2563eb, #60a5fa); font-weight:800;
      box-shadow: 0 8px 20px rgba(37,99,235,0.28);
    }
    .user-label { color:var(--muted2); font-size:12px; margin-bottom:5px; }
    .user-email { font-size:14px; line-height:1.55; word-break:break-word; }

    .btn {
      width:100%; border:none; cursor:pointer; color:var(--text);
      transition: transform .16s ease, opacity .2s ease, filter .2s ease;
    }
    .btn:active { transform: scale(0.985); }
    .btn:disabled { opacity:.64; cursor:not-allowed; filter:saturate(.7); }

    .btn-login, .nav-btn {
      padding:18px; border-radius:20px; font-size:18px; font-weight:700; color:white;
      background: linear-gradient(135deg, rgba(37,99,235,0.96), rgba(96,165,250,0.94));
      box-shadow: 0 14px 32px rgba(37,99,235,0.32);
      text-decoration:none; display:block; text-align:center;
    }
    .nav-grid { display:grid; gap:12px; }
    .nav-btn.secondary {
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04)), rgba(12,20,40,0.46);
      border:1px solid rgba(255,255,255,0.10);
      box-shadow: 0 10px 28px rgba(0,0,0,0.20);
    }
    .nav-btn .sub { display:block; margin-top:6px; font-size:11px; font-weight:500; color:rgba(255,255,255,0.78); }

    .primary-row { display:flex; gap:12px; align-items:stretch; }
    .btn-open {
      position:relative; overflow:hidden; flex:1; border-radius:26px; padding:24px 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 16%, rgba(255,255,255,0.02) 100%),
        linear-gradient(135deg, var(--blue1) 0%, var(--blue2) 52%, var(--blue3) 100%);
      box-shadow: 0 14px 36px rgba(37,99,235,0.30), 0 0 36px rgba(96,165,250,0.22);
    }
    .btn-open::before {
      content:""; position:absolute; inset:0;
      background: linear-gradient(120deg, transparent 18%, rgba(255,255,255,0.24) 42%, transparent 68%);
      transform: translateX(-150%); animation:sweep 3.9s linear infinite;
    }
    @keyframes sweep { 0%{transform:translateX(-150%)} 100%{transform:translateX(150%)} }
    .btn-open-title, .btn-open-sub { position:relative; z-index:1; display:block; text-align:center; }
    .btn-open-title { font-size:26px; font-weight:800; letter-spacing:.08em; }
    .btn-open-sub { margin-top:8px; font-size:12px; color:rgba(255,255,255,0.82); }

    .toggle-panel {
      width:122px; padding:12px 12px 10px; border-radius:26px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
      border:1px solid rgba(255,255,255,0.08);
      display:flex; flex-direction:column; justify-content:center; gap:8px;
    }
    .toggle-label { font-size:12px; color:var(--muted2); text-align:center; }
    .toggle-sub { font-size:11px; color:rgba(255,255,255,0.62); text-align:center; line-height:1.35; }

    .switch-wrap { display:flex; justify-content:center; }
    .switch { position:relative; width:66px; height:38px; display:inline-block; }
    .switch input { display:none; }
    .slider {
      position:absolute; inset:0; border-radius:999px; background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.12); box-shadow: inset 0 2px 10px rgba(0,0,0,0.24);
      transition:.25s ease;
    }
    .slider::before {
      content:""; position:absolute; width:28px; height:28px; left:4px; top:4px; border-radius:50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(219,231,255,0.96));
      box-shadow: 0 6px 16px rgba(0,0,0,0.22); transition:.25s ease;
    }
    .switch input:checked + .slider {
      background: linear-gradient(135deg, rgba(37,99,235,0.92), rgba(96,165,250,0.92));
    }
    .switch input:checked + .slider::before { transform: translateX(28px); }

    .secondary-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
    .btn-secondary {
      padding:18px 16px; border-radius:22px; font-size:17px; font-weight:700;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04)), rgba(12,20,40,0.46);
      border:1px solid rgba(255,255,255,0.10); box-shadow: 0 10px 28px rgba(0,0,0,0.20);
    }
    .btn-secondary .sub { display:block; margin-top:6px; font-size:11px; font-weight:500; color:var(--muted); }
    .btn-hangup {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04)),
        linear-gradient(135deg, var(--danger1), var(--danger2));
      color:#fff8f8;
    }
    .btn-debug {
      margin-top:14px; padding:14px 16px; border-radius:18px; font-size:15px; font-weight:700;
      color:#dbeafe; background: rgba(37,99,235,0.10); border:1px solid rgba(96,165,250,0.20);
    }

    .status-panel { display:flex; gap:12px; align-items:flex-start; margin-top:14px; }
    .status-icon {
      width:36px; height:36px; border-radius:12px; display:grid; place-items:center;
      background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.08);
    }
    .status-title { font-size:13px; color:var(--muted2); font-weight:600; margin-bottom:6px; letter-spacing:.08em; }
    .status-text { font-size:15px; line-height:1.65; word-break:break-word; }
    .ok { color:#c8f7d7; } .err { color:#ffd2d2; } .warn { color:#ffe7ad; } .muted { color:var(--muted); }

    .btn-logout {
      margin-top:14px; padding:14px 16px; border-radius:18px; font-size:15px; font-weight:700;
      color:#ffb3b3; background: rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.18);
    }

    .hidden { display:none !important; }

    @media (max-width:480px) {
      .title { font-size:40px; }
      .space { min-height:210px; }
      .primary-row { flex-direction:column; }
      .toggle-panel { width:100%; flex-direction:row; align-items:center; justify-content:space-between; }
      .toggle-copy { flex:1; }
      .toggle-label, .toggle-sub { text-align:left; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="top-actions">
        <a id="receiverLink" class="icon-link hidden" href="./receiver.html" title="临时访问审批">📥</a>
        <a id="paidReceiverLink" class="icon-link hidden" href="./paid-receiver.html" title="会员审批">💳</a>
      </div>
      <div class="chips">
        <div class="chip">Remote Access Ready</div>
        <div class="chip">Realtime Synced</div>
      </div>
      <h1 class="title">Door Control</h1>
      <p class="subtitle">
        登录后发送门禁指令。<br />
        页面状态与设备状态实时同步。
      </p>
    </section>

    <section class="space"></section>

    <section class="controls">
      <section id="loginSection" class="panel login-panel">
        <a id="guestApplyBtn" class="btn nav-btn secondary" href="./request.html" style="margin-bottom:12px;">
          申请临时访问
          <span class="sub">无需登录，提交申请后等待住户审批</span>
        </a>

        <a id="memberApplyBtn" class="btn nav-btn secondary" href="./membership-request.html" style="margin-bottom:12px;">
          申请会员
          <span class="sub">支持设备维护并申请长期使用权限</span>
        </a>

        <button id="loginBtn" class="btn btn-login">使用 Google 登录</button>
      </section>

      <section id="appSection" class="hidden">
        <div class="panel account-panel">
          <div class="avatar" id="avatar">U</div>
          <div>
            <div class="user-label">当前账户</div>
            <div class="user-email" id="userEmail">未登录</div>
          </div>
        </div>

        <section id="restrictedPanel" class="panel nav-panel hidden">
          <div style="font-size:18px;font-weight:700;margin-bottom:8px;">当前账号还没有门禁权限</div>
          <div style="color:var(--muted);line-height:1.75;font-size:14px;">
            你已经登录成功，但当前账号不在住户/管理员名单里，也还没有有效会员权限。<br />
            你可以先申请会员，或联系管理员为你开通权限。
          </div>

          <div class="nav-grid" style="margin-top:14px;">
            <a class="btn nav-btn secondary" href="./membership-request.html">
              申请会员
              <span class="sub">支持设备维护并申请长期使用权限</span>
            </a>

            <a class="btn nav-btn secondary" href="./request.html">
              申请临时访问
              <span class="sub">无需长期权限时，可先申请一次性访问</span>
            </a>
          </div>
        </section>

        <div class="panel button-panel" id="buttonPanel">
          <div class="primary-row">
            <button id="openBtn" class="btn btn-open">
              <span class="btn-open-title">OPEN DOOR</span>
              <span class="btn-open-sub">一键接通并执行开门</span>
            </button>

            <div class="toggle-panel">
              <div class="toggle-copy">
                <div class="toggle-label">自动挂机</div>
                <div class="toggle-sub">一键开门后自动挂断</div>
              </div>
              <div class="switch-wrap">
                <label class="switch">
                  <input id="autoHangupToggle" type="checkbox" checked />
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          </div>

          <div class="secondary-row">
            <button id="pickupBtn" class="btn btn-secondary">
              接电话
              <span class="sub">接通话筒，不执行开门</span>
            </button>

            <button id="unlockBtn" class="btn btn-secondary">
              开门
              <span class="sub">仅发送按钮按压指令</span>
            </button>
          </div>

          <button id="debugBtn" class="btn btn-debug hidden">进入后台调试页</button>
        </div>
      </section>

      <section class="panel status-panel">
        <div class="status-icon" id="statusIcon">●</div>
        <div>
          <div class="status-title">System Status</div>
          <div class="status-text muted" id="statusText">Ready</div>
        </div>
      </section>

      <button id="logoutBtn" class="btn btn-logout hidden">退出登录</button>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import {
      getDatabase,
      ref,
      get,
      set,
      onValue
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtoDn5nsyPdX4_qzE4mEiilorBlsMg8oI",
      authDomain: "door-control-1fb5a.firebaseapp.com",
      databaseURL: "https://door-control-1fb5a-default-rtdb.firebaseio.com",
      projectId: "door-control-1fb5a",
      storageBucket: "door-control-1fb5a.firebasestorage.app",
      messagingSenderId: "594532135937",
      appId: "1:594532135937:web:e5c91175f45f7d54d83c00"
    };

    const ADMIN_UID = "Mkcg6WPhneTMfmJmbUBD5h9Dpbb2";
    const AUTO_HANGUP_KEY = "door-control-auto-hangup";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    const loginSection = document.getElementById("loginSection");
    const appSection = document.getElementById("appSection");
    const restrictedPanel = document.getElementById("restrictedPanel");
    const buttonPanel = document.getElementById("buttonPanel");

    const loginBtn = document.getElementById("loginBtn");
    const openBtn = document.getElementById("openBtn");
    const pickupBtn = document.getElementById("pickupBtn");
    const unlockBtn = document.getElementById("unlockBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const debugBtn = document.getElementById("debugBtn");
    const autoHangupToggle = document.getElementById("autoHangupToggle");
    const userEmail = document.getElementById("userEmail");
    const avatar = document.getElementById("avatar");
    const statusText = document.getElementById("statusText");
    const statusIcon = document.getElementById("statusIcon");
    const receiverLink = document.getElementById("receiverLink");
    const paidReceiverLink = document.getElementById("paidReceiverLink");

    let latestDeviceState = null;
    let localBusyGuard = false;

    function setStatus(message, type = "muted") {
      statusText.textContent = message;
      statusText.className = `status-text ${type}`;
      statusIcon.textContent =
        type === "ok" ? "✓" :
        type === "err" ? "!" :
        type === "warn" ? "•" : "●";
    }

    function syncTopActions(user, role, canReviewPaid = false) {
      const canSeeReceiver = !!user && (user.uid === ADMIN_UID || role === "resident" || role === "admin");
      receiverLink.classList.toggle("hidden", !canSeeReceiver);
      paidReceiverLink.classList.toggle("hidden", !canReviewPaid);
    }

    function setLoggedOutUI() {
      loginSection.classList.remove("hidden");
      appSection.classList.add("hidden");
      restrictedPanel.classList.add("hidden");
      buttonPanel.classList.remove("hidden");
      logoutBtn.classList.add("hidden");
      debugBtn.classList.add("hidden");
      userEmail.textContent = "未登录";
      avatar.textContent = "U";
      syncTopActions(null, "", false);
    }

    function setLoggedInUI(user, role, hasDoorAccess, canReviewPaid) {
      loginSection.classList.add("hidden");
      appSection.classList.remove("hidden");
      logoutBtn.classList.remove("hidden");

      userEmail.textContent = user.email || "Unknown user";
      avatar.textContent = (user.email?.[0] || "U").toUpperCase();

      debugBtn.classList.toggle("hidden", user.uid !== ADMIN_UID);

      if (hasDoorAccess) {
        buttonPanel.classList.remove("hidden");
        restrictedPanel.classList.add("hidden");
      } else {
        buttonPanel.classList.add("hidden");
        restrictedPanel.classList.remove("hidden");
      }

      syncTopActions(user, role || "", canReviewPaid);
    }

    async function loadRole(uid) {
      try {
        const snap = await get(ref(db, `users/${uid}/role`));
        return snap.val() || "";
      } catch {
        return "";
      }
    }

    async function loadUserAccess(uid) {
      try {
        const snap = await get(ref(db, `userAccess/${uid}`));
        return snap.val() || null;
      } catch {
        return null;
      }
    }

    function computeDoorAccess(role, userAccess) {
      if (role === "admin" || role === "resident") return true;
      if (userAccess?.membershipActive === true && (userAccess?.paidUntil || 0) > Date.now()) return true;
      return false;
    }

    function loadAutoHangupPreference() {
      const saved = localStorage.getItem(AUTO_HANGUP_KEY);
      autoHangupToggle.checked = saved === null ? true : saved === "true";
    }

    function saveAutoHangupPreference() {
      localStorage.setItem(AUTO_HANGUP_KEY, String(autoHangupToggle.checked));
    }

    function updateButtonsFromDeviceState(state) {
      const now = Date.now();
      const online = !!state?.online && (now - (state?.lastSeen || 0) < 10000);
      const busy = !!state?.busy || localBusyGuard;
      const callActive = !!state?.callActive;
      const error = state?.error || "";
      const lastAction = state?.lastAction || "";

      if (callActive) {
        pickupBtn.classList.add("btn-hangup");
        pickupBtn.innerHTML = `挂电话<span class="sub">将话筒恢复到挂机位</span>`;
      } else {
        pickupBtn.classList.remove("btn-hangup");
        pickupBtn.innerHTML = `接电话<span class="sub">接通话筒，不执行开门</span>`;
      }

      openBtn.disabled = !online || busy;
      pickupBtn.disabled = !online || busy;
      unlockBtn.disabled = !online || busy;

      if (!online) {
        setStatus("设备离线或心跳超时。", "err");
      } else if (busy) {
        setStatus(`设备正在执行：${lastAction || "命令"}`, "warn");
      } else if (error) {
        setStatus(`设备错误：${error}`, "err");
      } else {
        setStatus("设备在线，状态已同步。", "ok");
      }
    }

    async function sendCommand(commandName, extra = {}) {
      const user = auth.currentUser;
      if (!user) throw new Error("not_logged_in");

      const role = await loadRole(user.uid);
      const userAccess = await loadUserAccess(user.uid);
      const hasDoorAccess = computeDoorAccess(role, userAccess);
      if (!hasDoorAccess) throw new Error("no_door_access");

      const cmdRef = ref(db, `commands/${commandName}`);
      const snap = await get(cmdRef);
      const cur = snap.val();
      if (cur?.pending === true) throw new Error("command_busy");

      const requestId = `${commandName}_${Date.now()}`;
      await set(cmdRef, {
        pending: true,
        requestId,
        requestedAt: Date.now(),
        requestedBy: user.uid,
        ...extra
      });
      return requestId;
    }

    loginBtn.addEventListener("click", async () => {
      try {
        setStatus("正在打开 Google 登录…", "warn");
        await signInWithPopup(auth, provider);
      } catch (err) {
        console.error(err);
        setStatus("登录失败。请检查 Firebase 配置。", "err");
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        setStatus("已退出登录。", "muted");
      } catch (err) {
        console.error(err);
        setStatus("退出失败。", "err");
      }
    });

    autoHangupToggle.addEventListener("change", () => {
      saveAutoHangupPreference();
      setStatus(autoHangupToggle.checked ? "自动挂机已开启。" : "自动挂机已关闭。", "ok");
    });

    openBtn.addEventListener("click", async () => {
      try {
        localBusyGuard = true;
        updateButtonsFromDeviceState(latestDeviceState || {});
        await sendCommand("open", { autoHangup: autoHangupToggle.checked });
      } catch (err) {
        console.error(err);
        setStatus(
          err?.message === "no_door_access"
            ? "当前账号还没有门禁权限。"
            : "发送一键开门指令失败。",
          "err"
        );
      } finally {
        setTimeout(() => {
          localBusyGuard = false;
          updateButtonsFromDeviceState(latestDeviceState || {});
        }, 600);
      }
    });

    pickupBtn.addEventListener("click", async () => {
      try {
        localBusyGuard = true;
        updateButtonsFromDeviceState(latestDeviceState || {});
        const callActive = !!latestDeviceState?.callActive;
        await sendCommand(callActive ? "hangup" : "pickup");
      } catch (err) {
        console.error(err);
        setStatus(
          err?.message === "no_door_access"
            ? "当前账号还没有门禁权限。"
            : "发送接听/挂机指令失败。",
          "err"
        );
      } finally {
        setTimeout(() => {
          localBusyGuard = false;
          updateButtonsFromDeviceState(latestDeviceState || {});
        }, 600);
      }
    });

    unlockBtn.addEventListener("click", async () => {
      try {
        localBusyGuard = true;
        updateButtonsFromDeviceState(latestDeviceState || {});
        await sendCommand("unlock");
      } catch (err) {
        console.error(err);
        setStatus(
          err?.message === "no_door_access"
            ? "当前账号还没有门禁权限。"
            : "发送开门指令失败。",
          "err"
        );
      } finally {
        setTimeout(() => {
          localBusyGuard = false;
          updateButtonsFromDeviceState(latestDeviceState || {});
        }, 600);
      }
    });

    debugBtn.addEventListener("click", () => {
      window.location.href = "./admin.html";
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        setLoggedOutUI();
        return;
      }

      const role = await loadRole(user.uid);
      const userAccess = await loadUserAccess(user.uid);

      let canReviewPaid = false;
      try {
        const paidReviewSnap = await get(ref(db, `users/${user.uid}/canReviewPaidAccess`));
        canReviewPaid = user.uid === ADMIN_UID || paidReviewSnap.val() === true;
      } catch {
        canReviewPaid = user.uid === ADMIN_UID;
      }

      const hasDoorAccess = computeDoorAccess(role, userAccess);
      setLoggedInUI(user, role, hasDoorAccess, canReviewPaid);

      if (hasDoorAccess) {
        setStatus("已登录，门禁权限可用。", "ok");
      } else {
        setStatus("已登录，但当前账号还没有门禁权限。", "warn");
      }
    });

    onValue(ref(db, "deviceState"), (snapshot) => {
      latestDeviceState = snapshot.val() || {};
      updateButtonsFromDeviceState(latestDeviceState);
    });

    loadAutoHangupPreference();
    syncTopActions(null, "", false);
  </script>
</body>
</html>
