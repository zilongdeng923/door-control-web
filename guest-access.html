<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>临时访问</title>
  <meta name="theme-color" content="#0b1226" />
  <style>
    :root {
      --bg:#0b1226; --text:#eef4ff; --muted:#a9bad7; --ok:#c8f7d7; --err:#ffd2d2; --warn:#ffe7ad;
      --panel:rgba(9,15,30,0.42); --border:rgba(255,255,255,0.08); --shadow:0 24px 60px rgba(0,0,0,0.42);
      --blue1:rgba(37,99,235,0.96); --blue2:rgba(59,130,246,0.94);
    }
    * { box-sizing: border-box; }
    html, body { margin:0; min-height:100%; font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); }
    body {
      min-height:100vh; display:flex; justify-content:center; padding:24px 18px;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.48) 58%, rgba(0,0,0,0.76) 100%),
        radial-gradient(circle at center, rgba(96,165,250,0.18) 0%, rgba(96,165,250,0.06) 24%, rgba(0,0,0,0) 48%);
    }
    .wrap { width:100%; max-width:480px; }
    .hero { text-align:center; margin-bottom:18px; }
    .title { margin:0 0 10px; font-size:42px; font-weight:800; letter-spacing:-0.04em; }
    .sub { margin:0; color:var(--muted); line-height:1.75; }
    .card {
      background:var(--panel); border:1px solid var(--border); border-radius:28px; padding:18px;
      backdrop-filter:blur(20px); box-shadow:var(--shadow); margin-bottom:14px;
    }
    .big {
      font-size:36px; font-weight:800; line-height:1.1; margin:10px 0 4px;
    }
    .muted { color:var(--muted); }
    .ok { color:var(--ok); } .err { color:var(--err); } .warn { color:var(--warn); }
    .btn {
      width:100%; border:none; cursor:pointer; color:#fff; padding:18px; border-radius:20px; font-size:18px; font-weight:700;
      background: linear-gradient(135deg, var(--blue1), var(--blue2)); box-shadow: 0 14px 32px rgba(37,99,235,0.32);
    }
    .btn:disabled { opacity:.64; cursor:not-allowed; }
    .status { line-height:1.75; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1 class="title">临时访问</h1>
      <p class="sub">这是审核通过后分配给你的独立临时访问页面。到期或次数用尽后会自动失效。</p>
    </section>

    <section class="card">
      <div class="muted">状态</div>
      <div id="stateText" class="big">加载中…</div>
      <div id="remainText" class="status muted">正在读取授权信息。</div>
    </section>

    <section class="card">
      <button id="openReqBtn" class="btn" disabled>请求开门</button>
      <div id="actionStatus" class="status muted" style="margin-top:12px;">设备会直接处理你的临时开门请求，不再依赖接收端常驻中转。</div>
    </section>
    <section class="card">
      <button id="newRequestBtn" class="btn" style="background: rgba(255,255,255,0.08); box-shadow:none; border:1px solid rgba(255,255,255,0.10);">提交新的申请</button>
      <div class="status muted" style="margin-top:12px;">当前授权失效后，可以从这里快速回到申请页。</div>
    </section>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtoDn5nsyPdX4_qzE4mEiilorBlsMg8oI",
      authDomain: "door-control-1fb5a.firebaseapp.com",
      databaseURL: "https://door-control-1fb5a-default-rtdb.firebaseio.com",
      projectId: "door-control-1fb5a",
      storageBucket: "door-control-1fb5a.firebasestorage.app",
      messagingSenderId: "594532135937",
      appId: "1:594532135937:web:e5c91175f45f7d54d83c00"
    };

    const GUEST_GRANT_KEY = "door-control-guest-grant-token";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));

    const stateText = document.getElementById("stateText");
    const remainText = document.getElementById("remainText");
    const actionStatus = document.getElementById("actionStatus");
    const openReqBtn = document.getElementById("openReqBtn");
    const newRequestBtn = document.getElementById("newRequestBtn");

    let currentGrant = null;
    let currentRequest = null;
    let timer = null;
    let grantUnsubscribe = null;
    let requestUnsubscribe = null;
    let grantToken = "";

    function storeGrantToken(token) {
      localStorage.setItem(GUEST_GRANT_KEY, token);
    }

    function clearGrantToken() {
      localStorage.removeItem(GUEST_GRANT_KEY);
      grantToken = "";
    }

    function getStoredGrantToken() {
      return localStorage.getItem(GUEST_GRANT_KEY) || "";
    }

    function normalizeGrantToken() {
      const fromHash = hashParams.get("grant") || "";
      const fromQuery = params.get("grant") || "";
      const fromStorage = getStoredGrantToken();
      const token = fromHash || fromQuery || fromStorage;
      if (token) storeGrantToken(token);
      if (fromHash || fromQuery) {
        history.replaceState({}, "", "./guest-access.html");
      }
      return token;
    }

    function fmtRemain(ms) {
      const sec = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h > 0) return `${h} 小时 ${m} 分 ${s} 秒`;
      return `${m} 分 ${s} 秒`;
    }

    function gotoRequestPage() {
      window.location.href = "./request.html";
    }

    function renderGrant() {
      if (!grantToken) {
        stateText.textContent = "无有效授权";
        remainText.textContent = "当前设备中没有保存可用的临时访问密钥。";
        openReqBtn.disabled = true;
        return;
      }

      if (!currentGrant) {
        stateText.textContent = "未找到授权";
        remainText.textContent = "该临时访问链接不存在、已失效，或还未同步完成。";
        openReqBtn.disabled = true;
        return;
      }

      const now = Date.now();
      const expired = (currentGrant.expiresAt || 0) <= now;
      const noUsesLeft = (currentGrant.remainingUses || 0) <= 0;
      const active = currentGrant.status === "active" && !expired && !noUsesLeft;

      if (expired || currentGrant.status === "expired") {
        stateText.textContent = "已过期";
        remainText.textContent = "授权时间已结束。";
        actionStatus.textContent = "这份临时访问已失效，请重新提交申请。";
        openReqBtn.disabled = true;
        clearGrantToken();
        return;
      }

      if (noUsesLeft || currentGrant.status === "used") {
        stateText.textContent = "次数已用尽";
        remainText.textContent = "当前授权的开门次数已经全部使用。";
        actionStatus.textContent = "这份临时访问已失效，请重新提交申请。";
        openReqBtn.disabled = true;
        clearGrantToken();
        return;
      }

      if (active) {
        stateText.textContent = "有效";
        remainText.textContent = `剩余时间：${fmtRemain(currentGrant.expiresAt - now)}；剩余次数：${currentGrant.remainingUses}`;
        openReqBtn.disabled = false;
        return;
      }

      stateText.textContent = currentGrant.status || "未知";
      remainText.textContent = "当前授权状态不可用。";
      openReqBtn.disabled = true;
    }

    function renderRequestStatus() {
      if (!currentRequest) return;
      const status = currentRequest.status || "";
      const message = currentRequest.message || "";
      if (status === "pending") {
        actionStatus.textContent = "开门请求已提交，设备正在等待处理。";
        return;
      }
      if (status === "processing") {
        actionStatus.textContent = "设备正在执行开门动作，请稍等。";
        return;
      }
      if (status === "processed") {
        actionStatus.textContent = "门禁请求已处理完成。";
        return;
      }
      if (status === "rejected") {
        if (message === "grant_invalid") {
          actionStatus.textContent = "授权已失效，请重新提交申请。";
        } else if (message === "device_busy") {
          actionStatus.textContent = "设备正忙，请稍后再试。";
        } else if (message === "device_offline") {
          actionStatus.textContent = "设备当前离线，请稍后再试。";
        } else {
          actionStatus.textContent = "这次开门请求未成功，请再试一次。";
        }
      }
    }

    function startGrantListener() {
      grantToken = normalizeGrantToken();
      if (!grantToken) {
        renderGrant();
        return;
      }

      if (grantUnsubscribe) grantUnsubscribe();
      if (requestUnsubscribe) requestUnsubscribe();

      grantUnsubscribe = onValue(ref(db, `temporaryAccessGrants/${grantToken}`), (snapshot) => {
        currentGrant = snapshot.val();
        renderGrant();
      }, (error) => {
        console.error(error);
        stateText.textContent = "读取失败";
        remainText.textContent = "无法读取授权信息。";
        openReqBtn.disabled = true;
      });

      requestUnsubscribe = onValue(ref(db, `guestDoorRequests/${grantToken}`), (snapshot) => {
        currentRequest = snapshot.val();
        renderRequestStatus();
      }, (error) => {
        console.error(error);
      });

      if (timer) clearInterval(timer);
      timer = setInterval(renderGrant, 1000);
    }

    openReqBtn.addEventListener("click", async () => {
      if (!grantToken || !currentGrant) return;

      try {
        const now = Date.now();
        const expired = (currentGrant.expiresAt || 0) <= now;
        const noUsesLeft = (currentGrant.remainingUses || 0) <= 0;

        if (expired || noUsesLeft || currentGrant.status !== "active") {
          actionStatus.textContent = "当前授权已不可用。";
          renderGrant();
          return;
        }

        await set(ref(db, `guestDoorRequests/${grantToken}`), {
          createdAt: now,
          status: "pending",
          processedAt: 0,
          processorUid: "",
          requestId: `guest_${now}`,
          message: "waiting"
        });

        actionStatus.textContent = "开门请求已提交，设备正在等待处理。";
      } catch (error) {
        console.error(error);
        actionStatus.textContent = "提交开门请求失败。";
      }
    });

    newRequestBtn.addEventListener("click", gotoRequestPage);

    startGrantListener();

    window.addEventListener("beforeunload", () => {
      if (timer) clearInterval(timer);
      if (grantUnsubscribe) grantUnsubscribe();
      if (requestUnsubscribe) requestUnsubscribe();
    });
  </script>
</body>
</html>
