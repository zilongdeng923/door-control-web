<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Door Control Admin</title>
  <meta name="theme-color" content="#0b1226" />
  <style>
    :root {
      --bg:#0b1226; --text:#eef4ff; --muted:#a9bad7; --ok:#7ae39e; --err:#ffb3b3;
      --panel:rgba(9,15,30,0.44); --border:rgba(255,255,255,0.08); --shadow:0 24px 60px rgba(0,0,0,0.42);
      --blue1:#2563eb; --blue2:#60a5fa;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
    body{padding:24px 18px;background:
      radial-gradient(circle at center, rgba(96,165,250,0.12) 0%, rgba(0,0,0,0) 42%),
      linear-gradient(180deg,#0b1226,#091122)}
    .wrap{max-width:900px;margin:0 auto}
    .title{font-size:38px;font-weight:800;margin:0 0 8px}
    .sub{color:var(--muted);margin:0 0 20px;line-height:1.7}
    .card{
      background:var(--panel);border:1px solid var(--border);border-radius:26px;padding:18px;
      backdrop-filter:blur(18px);box-shadow:var(--shadow);margin-bottom:16px
    }
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    input[type=number]{
      width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06);color:var(--text);font-size:16px
    }
    .row{display:flex;gap:12px;flex-wrap:wrap}
    button{
      border:none;border-radius:16px;padding:14px 18px;cursor:pointer;font-weight:700;
      color:white;background:linear-gradient(135deg,var(--blue1),var(--blue2))
    }
    button.secondary{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1)}
    .status{line-height:1.7;color:var(--muted);white-space:pre-wrap}
    .ok{color:#c8f7d7}.err{color:#ffd2d2}.muted{color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">Door Control Admin</h1>
    <p class="sub">后台调试页。读取/保存 Firebase 参数，并直接测试设备动作。</p>

    <div class="card">
      <div id="authInfo" class="status">正在验证身份…</div>
    </div>

    <div id="mainArea" style="display:none;">
      <div class="card">
        <h3>当前设备状态</h3>
        <div id="deviceStateBox" class="status">加载中…</div>
      </div>

      <div class="card">
        <h3>参数配置</h3>
        <div class="grid">
          <div><label>话筒挂机位</label><input id="micIdle" type="number" min="0" max="180"></div>
          <div><label>话筒激活位</label><input id="micActive" type="number" min="0" max="180"></div>
          <div><label>按钮挂机位</label><input id="btnIdle" type="number" min="0" max="180"></div>
          <div><label>按钮激活位</label><input id="btnActive" type="number" min="0" max="180"></div>
          <div><label>按钮预摆角度</label><input id="btnPreload" type="number" min="0" max="60"></div>
          <div><label>按钮停留时间(ms)</label><input id="btnHoldMs" type="number" min="0" max="3000"></div>
          <div><label>一键开门话筒延时(ms)</label><input id="openAutoMicDelayMs" type="number" min="0" max="10000"></div>
          <div><label>一键开门后处理延时(ms)</label><input id="openPostPunchDelayMs" type="number" min="0" max="10000"></div>
        </div>
        <div class="row" style="margin-top:14px;">
          <button id="loadConfigBtn" class="secondary">读取参数</button>
          <button id="saveConfigBtn">保存参数</button>
        </div>
      </div>

      <div class="card">
        <h3>测试命令</h3>
        <div class="row">
          <button id="pickupBtn">接电话</button>
          <button id="hangupBtn" class="secondary">挂电话</button>
          <button id="unlockBtn">开门</button>
          <button id="openBtn">一键开门</button>
        </div>
      </div>

      <div class="card">
        <h3>日志</h3>
        <div id="logBox" class="status muted">Ready</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtoDn5nsyPdX4_qzE4mEiilorBlsMg8oI",
      authDomain: "door-control-1fb5a.firebaseapp.com",
      databaseURL: "https://door-control-1fb5a-default-rtdb.firebaseio.com",
      projectId: "door-control-1fb5a",
      storageBucket: "door-control-1fb5a.firebasestorage.app",
      messagingSenderId: "594532135937",
      appId: "1:594532135937:web:e5c91175f45f7d54d83c00"
    };

    const ADMIN_UID = "Mkcg6WPhneTMfmJmbUBD5h9Dpbb2";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const authInfo = document.getElementById("authInfo");
    const mainArea = document.getElementById("mainArea");
    const deviceStateBox = document.getElementById("deviceStateBox");
    const logBox = document.getElementById("logBox");

    const ids = [
      "micIdle","micActive","btnIdle","btnActive","btnPreload","btnHoldMs",
      "openAutoMicDelayMs","openPostPunchDelayMs"
    ];

    function log(msg, type = "muted") {
      logBox.className = `status ${type}`;
      logBox.textContent = msg;
    }

    async function loadConfig() {
      const snap = await get(ref(db, "admin/config"));
      const cfg = snap.val() || {};
      ids.forEach(id => {
        document.getElementById(id).value = cfg[id] ?? "";
      });
      log("已读取参数。", "ok");
    }

    async function saveConfig() {
      const cfg = {};
      ids.forEach(id => cfg[id] = Number(document.getElementById(id).value));
      await set(ref(db, "admin/config"), cfg);
      log("参数已保存。", "ok");
    }

    async function sendCommand(name, extra = {}) {
      const user = auth.currentUser;
      if (!user) throw new Error("not_logged_in");
      await set(ref(db, `commands/${name}`), {
        pending: true,
        requestId: `${name}_${Date.now()}`,
        requestedAt: Date.now(),
        requestedBy: user.uid,
        ...extra
      });
      log(`已发送命令：${name}`, "ok");
    }

    document.getElementById("loadConfigBtn").addEventListener("click", loadConfig);
    document.getElementById("saveConfigBtn").addEventListener("click", saveConfig);
    document.getElementById("pickupBtn").addEventListener("click", () => sendCommand("pickup").catch(e => log(String(e), "err")));
    document.getElementById("hangupBtn").addEventListener("click", () => sendCommand("hangup").catch(e => log(String(e), "err")));
    document.getElementById("unlockBtn").addEventListener("click", () => sendCommand("unlock").catch(e => log(String(e), "err")));
    document.getElementById("openBtn").addEventListener("click", () => sendCommand("open", { autoHangup: true }).catch(e => log(String(e), "err")));

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        authInfo.textContent = "未登录，无法进入后台。请先从首页登录。";
        mainArea.style.display = "none";
        return;
      }
      if (user.uid !== ADMIN_UID) {
        authInfo.textContent = `当前账号 ${user.email} 无权访问后台。`;
        mainArea.style.display = "none";
        return;
      }

      authInfo.textContent = `已授权：admin ${user.email}`;
      mainArea.style.display = "block";
      await loadConfig();
    });

    onValue(ref(db, "deviceState"), (snapshot) => {
      const s = snapshot.val() || {};
      deviceStateBox.textContent = JSON.stringify(s, null, 2);
    });
  </script>
</body>
</html>
